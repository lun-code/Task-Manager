# URL de conexion - el host vendra de una variable de entorno en el servidor
spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}

# Credenciales
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Validate: Hibernate solo comprueba que las tablas coinciden, nunca las modifica
spring.jpa.hibernate.ddl-auto=validate

# Sin logs SQL en produccion para no exponer datos sensibles
spring.jpa.show-sql=false

# Deshabilitar OpenAPI/Swagger en producción
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false