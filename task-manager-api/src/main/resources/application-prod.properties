# ==========================================
# 1. PERSISTENCIA DE DATOS (PostgreSQL)
# ==========================================

# URL de conexión: Railway inyecta automaticamente la cadena completa en DATABASE_URL
spring.datasource.url=${DATABASE_URL}

# Credenciales: Se obtienen de las variables generadas por el plugin de Postgres en Railway
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# Especifica el controlador de base de datos para asegurar la compatibilidad con PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Define el comportamiento de Hibernate al iniciar:
# 'update' sincroniza las entidades Java con las tablas existentes sin borrar datos
spring.jpa.hibernate.ddl-auto=update

# Controla si se imprimen las consultas SQL en la consola (false para un log mas limpio)
spring.jpa.show-sql=false


# ==========================================
# 2. SEGURIDAD Y JWT
# ==========================================

# Clave privada para firmar los tokens: DEBES crear esta variable en el panel de Railway
security.jwt.secret-key=${JWT_SECRET}

# Tiempo de validez del token en milisegundos (3.600.000 ms = 1 hora)
security.jwt.expiration-time=3600000


# ==========================================
# 3. SERVICIO DE CORREO (SMTP Gmail)
# ==========================================

# Servidor de salida y puerto para el envio de correos
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# Usuario y Contraseńa de Aplicación (Configurar como variables en Railway)
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# Habilita la autenticacion mediante usuario/contrasena
spring.mail.properties.mail.smtp.auth=true

# Activa el cifrado TLS (seguridad obligatoria para Gmail)
spring.mail.properties.mail.smtp.starttls.enable=true