spring.application.name=task-manager-api

# -----------------------------
# Puerto
# -----------------------------
# Render asigna el puerto dinámicamente mediante la variable de entorno PORT.
# Si no existe (ej. en local), se usa el valor por defecto 8080.
server.port=${PORT:8080}

# -----------------------------
# Base de datos (PostgreSQL en Aiven)
# -----------------------------
# Variables genéricas (DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD)
# para no depender de una plataforma de hosting concreta.
# sslmode=require -> Aiven exige conexión cifrada SSL.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Madrid

# JWT
security.jwt.secret-key=${JWT_SECRET}
security.jwt.expiration-time=3600000

# Mail
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true